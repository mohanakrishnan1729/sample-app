server {
    listen 80;
    server_name localhost;   # replace with yourdomain.com in production

    # ─────────────────────────────────────────
    # Serve React Frontend (static files)
    # ─────────────────────────────────────────
    location / {
        root /usr/share/nginx/html;   # where React dist/ files live
        index index.html;

        # This is critical for React Router!
        # Without this, refreshing /recipe/123 gives 404
        try_files $uri $uri/ /index.html;
    }

    # ─────────────────────────────────────────
    # Reverse Proxy — Forward /api/* to Express
    # ─────────────────────────────────────────
    location /api/ {
        proxy_pass http://localhost:5000;

        # Pass real client info to Express
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ─────────────────────────────────────────
    # Health Check endpoint
    # ─────────────────────────────────────────
    location /health {
        proxy_pass http://localhost:5000/health;
    }

    # ─────────────────────────────────────────
    # Gzip compression — makes app load faster
    # ─────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
    gzip_min_length 1000;
}
